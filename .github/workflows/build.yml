name: Multi-Platform Build
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to build (optional, defaults to latest tag)'
        required: false
        type: string

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            nsis \
            fakeroot \
            rpm

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20.14"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.7.1

      - name: Build Linux
        run: wails build -clean -platform linux/amd64 -ldflags='-s -w'

      - name: Create DEB package
        run: |
          mkdir -p nf-disk-deb/DEBIAN
          mkdir -p nf-disk-deb/usr/bin
          mkdir -p nf-disk-deb/usr/share/applications
          mkdir -p nf-disk-deb/usr/share/icons/hicolor/256x256/apps
          
          cp build/bin/nf-disk nf-disk-deb/usr/bin/nf-disk
          
          # Create desktop entry
          cat > nf-disk-deb/usr/share/applications/nf-disk.desktop << 'EOF'
          [Desktop Entry]
          Name=nf-disk
          Comment=S3 Storage Manager
          Exec=nf-disk
          Icon=nf-disk
          Terminal=false
          Type=Application
          Categories=Utility;FileTools;
          EOF
          
          # Create control file
          cat > nf-disk-deb/DEBIAN/control << 'EOF'
          Package: nf-disk
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: loveuer <loveuer@ulive.com>
          Description: S3 Storage Manager
           A desktop application for managing S3 storage.
          Depends: libgtk-3-0, libwebkit2gtk-4.0-37
          EOF
          
          # Get version from tag
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/\${VERSION}/$VERSION/g" nf-disk-deb/DEBIAN/control
          
          # Build deb package
          fakeroot dpkg-deb --build nf-disk-deb build/bin/nf-disk-amd64.deb

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            build/bin/nf-disk
            build/bin/nf-disk-amd64.deb

  build-windows:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20.14"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.7.1

      - name: Build Windows
        run: wails build -clean -nsis -ldflags='-s -w'

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            build/bin/nf-disk-amd64-installer.exe
            build/bin/nf-disk.exe

  build-darwin-arm:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20.14"

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.7.1
          
      - name: Install create-dmg (for DMG packaging)
        run: |
          brew install create-dmg

      - name: Build macOS ARM
        run: |
          wails build -clean -platform darwin/arm64 -ldflags='-s -w' -o nf-disk-arm64

      - name: Create DMG installer
        run: |
          cd build/bin
          create-dmg \
            --volname "nf-disk Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            nf-disk-arm64-installer.dmg \
            nf-disk-arm64.app

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm-binaries
          path: |
            build/bin/nf-disk-arm64.app
            build/bin/nf-disk-arm64-installer.dmg

  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-darwin-arm]
    permissions:
      contents: write
    steps:
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: release-artifacts

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: release-artifacts

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: darwin-arm-binaries
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          files: |
            release-artifacts/*
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'v') }}